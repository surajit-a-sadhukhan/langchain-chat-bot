<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Documents — LangChain</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .grid{display:grid;grid-template-columns:1fr 320px;gap:16px}
    .doc-list{max-height:560px;overflow:auto;padding:8px}
    .doc-item{padding:10px;border-radius:8px;border:1px solid #eef2ff;background:#fbfeff;margin-bottom:8px}
    label{display:block;margin-bottom:8px;font-size:13px;color:#334155}
    input,textarea{width:100%;padding:10px;border-radius:8px;border:1px solid #e6eef8}
    .small{font-size:13px;color:#64748b}
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>Documents</h1>
      <nav class="toolbar">
        <a href="/chat.html">AI Chat</a>
        <a href="/documents.html">Documents</a>
        <a href="/appointments.html">Appointments</a>
      </nav>
      <div class="user-nav">
        <span id="userBadge"></span>
        <button id="logoutBtn" class="btn-logout">Logout</button>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="grid">
      <div class="card" style="padding:16px">
        <h3>Uploaded Documents</h3>
        <div id="list" class="doc-list"></div>
      </div>

      <div class="card" style="padding:16px">
        <h3>Upload</h3>
        <label>Title <input id="title" /></label>
        <label>Source <input id="source" placeholder="manual"/></label>
        <label>Text <textarea id="text" rows="8"></textarea></label>
        <label>File <input id="file" type="file" accept=".txt"/></label>
        <div style="display:flex;gap:8px;margin-top:10px">
          <button id="upload" class="button-primary">Upload</button>
          <button id="refresh" class="small">Refresh</button>
        </div>
        <div id="status" class="small" style="margin-top:10px"></div>
      </div>
    </div>
  </div>

  <script src="/script.js"></script>
  <script>
    const listEl = document.getElementById('list');
    const titleEl = document.getElementById('title');
    const sourceEl = document.getElementById('source');
    const textEl = document.getElementById('text');
    const fileEl = document.getElementById('file');
    const statusEl = document.getElementById('status');
    const uploadBtn = document.getElementById('upload');
    const refreshBtn = document.getElementById('refresh');

    async function loadDocs(){
      listEl.innerHTML = 'Loading...';
      try{
        const resp = await fetch(`/documents?userId=${encodeURIComponent(currentUser?.id)}`);
        const data = await resp.json();
        if(!data.documents.length){ listEl.innerHTML = '<div class="small">No documents yet.</div>'; return }
        listEl.innerHTML = '';
        data.documents.forEach(d=>{
          const div = document.createElement('div');
          div.className = 'doc-item';
          div.innerHTML = `<strong>${escapeHtml(d.title)}</strong><div class="small">${escapeHtml(d.source)} · ${d.length} chars</div>`;
          listEl.appendChild(div);
        });
      }catch(err){ listEl.innerHTML = 'Failed to load documents.' }
    }

    async function readFile(f){ if(!f) return ''; return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.toString()); r.onerror=()=>rej(r.error); r.readAsText(f,'UTF-8'); }) }

    fileEl.addEventListener('change', async ()=>{ const f=fileEl.files?.[0]; if(!f) return; statusEl.textContent='Reading file...'; try{ textEl.value = await readFile(f); statusEl.textContent=`Loaded ${f.name}` }catch(e){ statusEl.textContent='Failed to read file.' } });

    uploadBtn.addEventListener('click', async ()=>{
      const title = titleEl.value.trim(); const source = sourceEl.value.trim()||'manual'; const text = textEl.value.trim();
      if(!title||!text){ statusEl.textContent='Provide title and text.'; return }
      uploadBtn.disabled = true; statusEl.textContent='Uploading...';
      try{
        const resp = await fetch('/upload',{ method:'POST',headers:{'Content-Type':'application/json'}, body:JSON.stringify({ title, source, text, userId: currentUser.id }) });
        const data = await resp.json(); if(!resp.ok) throw new Error(data.error||'Upload failed');
        statusEl.textContent = `Uploaded ${data.document.title}`;
        titleEl.value=''; sourceEl.value=''; textEl.value=''; fileEl.value='';
        await loadDocs();
      }catch(e){ statusEl.textContent = e.message||'Upload failed.' }
      finally{ uploadBtn.disabled=false }
    });

    refreshBtn.addEventListener('click', loadDocs);
    loadDocs();
  </script>
</body>
</html>
