<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chat — LangChain</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .chat-card{background:var(--card);border-radius:12px;padding:18px;box-shadow:0 6px 20px rgba(16,24,40,0.06)}
    .messages{height:420px;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:12px}
    .msg{max-width:78%;padding:12px 14px;border-radius:12px;line-height:1.45;white-space:pre-wrap}
    .msg.assistant{background:#eef2ff;color:#0f172a;align-self:flex-start;border-top-left-radius:4px}
    .msg.user{background:#e6fffa;color:#064e3b;align-self:flex-end;border-top-right-radius:4px;text-align:right}
    .meta{font-size:12px;color:var(--muted);margin-top:6px}
    .input-row{display:flex;gap:12px;margin-top:12px}
    .input-row input{flex:1;padding:12px;border-radius:10px;border:1px solid #e6edf6}
    .input-row button{background:var(--primary);color:#fff;border:none;padding:0 18px;border-radius:10px;cursor:pointer}
    .sources{margin-top:12px;font-size:13px;color:var(--muted);}
    .source-item{background:#fafafa;border:1px solid #eef2ff;padding:10px;border-radius:8px;margin-bottom:8px}
    footer{max-width:960px;margin:18px auto;padding:0 16px;color:var(--muted);font-size:13px}
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>Professional Chat</h1>
      <nav class="toolbar">
        <a href="/chat.html">AI Chat</a>
        <a href="/documents.html">Documents</a>
        <a href="/appointments.html">Appointments</a>
        <a href="/tickets.html">Tickets</a>
      </nav>
      <div class="user-nav">
        <span id="userBadge"></span>
        <button id="logoutBtn" class="btn-logout">Logout</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="chat-card">
      <div class="messages" id="messages" aria-live="polite"></div>

      <div class="meta">Tip: include context or ask follow-up questions</div>

      <div class="input-row">
        <input id="messageInput" placeholder="Ask anything..." autocomplete="off" />
        <button id="sendBtn">Send</button>
      </div>

      <div class="sources" id="sources" hidden>
        <strong>Sources:</strong>
        <div id="sourcesList"></div>
      </div>
    </div>
  </main>

  <footer>Running OpenAI-powered assistant · <a href="/" style="color:inherit;text-decoration:underline">Home</a></footer>

  <script src="/script.js"></script>
  <script>
    const messagesEl = document.getElementById('messages');
    const input = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const sourcesEl = document.getElementById('sources');
    const sourcesList = document.getElementById('sourcesList');

    function appendMessage(text, cls) {
      const wrap = document.createElement('div');
      wrap.className = 'msg ' + cls;
      wrap.textContent = text;
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showSources(docs){
      sourcesList.innerHTML = '';
      if(!docs || !docs.length){ sourcesEl.hidden = true; return }
      docs.forEach(d=>{
        const div = document.createElement('div');
        div.className = 'source-item';
        div.innerHTML = `<strong>${escapeHtml(d.title)}</strong><div style="font-size:12px;color:#475569">${escapeHtml(d.source)}</div>`;
        sourcesList.appendChild(div);
      });
      sourcesEl.hidden = false;
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ e.preventDefault(); sendMessage(); } });

    const history = [];
    let appointmentDetails = {
      clientName: null,
      email: null,
      phone: null,
      appointmentDateTime: null,
      query: null
    };

    async function sendMessage(){
      const text = input.value.trim();
      if(!text) return;
      appendMessage(text,'user');
      input.value = '';
      sendBtn.disabled = true;

      appendMessage('Thinking...','assistant');
      const lastAssistant = messagesEl.querySelector('.msg.assistant:last-child');

      try{
        const resp = await fetch('/chat', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({ message: text, history: history, appointmentDetails: appointmentDetails, userId: currentUser.id })
        });
        const data = await resp.json();
        if(!resp.ok) throw new Error(data.error || 'Chat failed');
        // replace 'Thinking...' with actual answer
        if(lastAssistant) lastAssistant.textContent = data.response || JSON.stringify(data);
        
        // Push user and assistant response to history
        history.push({ role: 'user', content: text });
        history.push({ role: 'assistant', content: data.response || '' });

        // Update local appointment details state
        if(data.details) {
          appointmentDetails = {
            clientName: data.details.clientName || appointmentDetails.clientName,
            email: data.details.email || appointmentDetails.email,
            phone: data.details.phone || appointmentDetails.phone,
            appointmentDateTime: data.details.appointmentDateTime || appointmentDetails.appointmentDateTime,
            query: data.details.query || appointmentDetails.query
          };
        }

        // Reset if booking completes
        if(data.appointment) {
          appointmentDetails = {
            clientName: null,
            email: null,
            phone: null,
            appointmentDateTime: null,
            query: null
          };
        }

        showSources(data.retrievedDocuments || []);
        // Show save indicator only for technical queries
        if(data.saved) {
          const saveIndicator = document.createElement('div');
          saveIndicator.style.fontSize = '11px';
          saveIndicator.style.color = '#10b981';
          saveIndicator.style.marginTop = '4px';
          saveIndicator.textContent = '✓ Technical query saved to database';
          if(lastAssistant) lastAssistant.appendChild(saveIndicator);
        }
      }catch(err){
        if(lastAssistant) lastAssistant.textContent = err.message || 'Error';
      }finally{ sendBtn.disabled = false }
    }
  </script>
</body>
</html>
