<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login / Register — LangChain Chat</title>
  <style>
    body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial;background:#eef2ff;color:#0f172a;display:flex;align-items:center;justify-content:center;height:100vh}
    .card{background:#fff;border-radius:20px;box-shadow:0 24px 80px rgba(15,23,42,.12);width:min(520px,92vw);padding:28px}
    h1{margin:0 0 18px;font-size:26px;color:#111827}
    p{margin:0 0 20px;color:#475569;line-height:1.6}
    .tab-buttons{display:flex;gap:12px;margin-bottom:20px}
    .tab-buttons button{flex:1;padding:12px 16px;border-radius:12px;border:1px solid #dbe2ef;background:#f8fafc;color:#111827;cursor:pointer;font-weight:700}
    .tab-buttons button.active{background:#2563eb;color:#fff;border-color:#2563eb}
    label{display:block;font-size:14px;color:#334155;margin-bottom:6px}
    input{width:100%;padding:12px 14px;margin-bottom:16px;border:1px solid #dbe2ef;border-radius:12px;font-size:15px}
    button[type="submit"]{width:100%;padding:12px 16px;border:none;border-radius:12px;background:#2563eb;color:#fff;font-weight:700;cursor:pointer}
    .note{font-size:13px;color:#64748b;margin-top:16px;background:#f8fafc;padding:14px;border-radius:12px;border:1px solid #e2e8f0}
    .error{color:#b91c1c;font-size:14px;margin-bottom:12px}
    .success{color:#047857;font-size:14px;margin-bottom:12px}
  </style>
</head>
<body>
  <div class="card">
    <div class="tab-buttons">
      <button id="loginTab" class="active" type="button">Login</button>
      <button id="registerTab" type="button">Register</button>
    </div>
    <h1 id="formTitle">Login to your account</h1>
    <p id="formSubtitle">Login with your email and password to access your documents and chat.</p>
    <div id="message" class="error" hidden></div>

    <form id="loginForm">
      <label for="loginEmail">Email</label>
      <input id="loginEmail" name="email" type="email" autocomplete="email" required />
      <label for="loginPassword">Password</label>
      <input id="loginPassword" name="password" type="password" autocomplete="current-password" required />
      <button type="submit">Login</button>
    </form>

    <form id="registerForm" hidden>
      <label for="registerName">Name</label>
      <input id="registerName" name="name" type="text" autocomplete="name" required />
      <label for="registerEmail">Email</label>
      <input id="registerEmail" name="email" type="email" autocomplete="email" required />
      <label for="registerPassword">Password</label>
      <input id="registerPassword" name="password" type="password" autocomplete="new-password" required />
      <button type="submit">Register</button>
    </form>

    <div class="note">
      If you are using the sample user, register with the email below or login after registration:
      <ul style="margin:8px 0 0 16px;padding:0;list-style:disc">
        <li>Name: surajit</li>
        <li>Email: surajit@yest.com</li>
        <li>Password: Surajit@1992</li>
      </ul>
    </div>
  </div>

  <script>
    const loginTab = document.getElementById('loginTab');
    const registerTab = document.getElementById('registerTab');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const formTitle = document.getElementById('formTitle');
    const formSubtitle = document.getElementById('formSubtitle');
    const messageEl = document.getElementById('message');

    const showTab = (tab) => {
      const isLogin = tab === 'login';
      loginForm.hidden = !isLogin;
      registerForm.hidden = isLogin;
      loginTab.classList.toggle('active', isLogin);
      registerTab.classList.toggle('active', !isLogin);
      formTitle.textContent = isLogin ? 'Login to your account' : 'Create a new account';
      formSubtitle.textContent = isLogin
        ? 'Login with your email and password to access your documents and chat.'
        : 'Register a new account to keep your documents and chat separate.';
      messageEl.hidden = true;
    };

    loginTab.addEventListener('click', () => showTab('login'));
    registerTab.addEventListener('click', () => showTab('register'));

    const saveSessionUser = (user) => {
      sessionStorage.setItem('currentUser', JSON.stringify(user));
      window.location.href = '/chat.html';
    };

    loginForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      messageEl.hidden = true;
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      try {
        const resp = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || 'Login failed');
        saveSessionUser(data.user);
      } catch (error) {
        messageEl.textContent = error.message;
        messageEl.className = 'error';
        messageEl.hidden = false;
      }
    });

    registerForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      messageEl.hidden = true;
      const name = document.getElementById('registerName').value.trim();
      const email = document.getElementById('registerEmail').value.trim();
      const password = document.getElementById('registerPassword').value;

      try {
        const resp = await fetch('/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || 'Registration failed');
        saveSessionUser(data.user);
      } catch (error) {
        messageEl.textContent = error.message;
        messageEl.className = 'error';
        messageEl.hidden = false;
      }
    });
  </script>
</body>
</html>
