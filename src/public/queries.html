<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Query List — LangChain</title>
  <style>
    :root{--bg:#f5f7fb;--card:#ffffff;--muted:#6b7280;--primary:#3743ff;--success:#16a34a;--warn:#c2410c}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial;color:#0f172a;background:var(--bg)}
    header{background:linear-gradient(90deg,#3b82f6 0%,#7c3aed 100%);color:#fff;padding:20px 28px}
    header h1{margin:0;font-size:20px;letter-spacing:-0.2px}
    .toolbar{display:flex;gap:12px;flex-wrap:wrap}
    .toolbar a{color:rgba(255,255,255,0.92);text-decoration:none;font-weight:600}
    .container{max-width:960px;margin:24px auto;padding:0 16px}
    .card{background:var(--card);border-radius:12px;padding:24px;box-shadow:0 6px 20px rgba(16,24,40,0.06)}
    .query-table{width:100%;border-collapse:collapse}
    .query-table th,.query-table td{padding:12px 14px;border-bottom:1px solid #f1f5f9;text-align:left}
    .query-table th{font-weight:700;color:#334155;background:#f8fafc}
    .status-badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700}
    .status-open{background:#eff6ff;color:#1d4ed8}
    .status-pending{background:#ffedd5;color:#9a3412}
    .actions button{background:#3743ff;color:#fff;border:none;padding:8px 12px;border-radius:10px;cursor:pointer}
    .small{font-size:13px;color:var(--muted)}
  </style>
</head>
<body>
  <header>
    <div style="display:flex;justify-content:space-between;align-items:center;max-width:960px;margin:0 auto">
      <h1>Queries</h1>
      <nav class="toolbar">
        <a href="/chat.html">AI Chat</a>
        <a href="/documents.html">Documents</a>
        <a href="/support.html">Support</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
        <div>
          <h2>Saved queries</h2>
          <p class="small">Query number, title, description, and status are listed below.</p>
        </div>
        <button id="refreshBtn">Refresh</button>
      </div>
      <div id="listArea">Loading queries…</div>
    </div>
  </main>

  <script>
    const listArea = document.getElementById('listArea');
    const refreshBtn = document.getElementById('refreshBtn');

    function createStatusBadge(status) {
      const span = document.createElement('span');
      span.className = `status-badge status-${status}`;
      span.textContent = status;
      return span;
    }

    async function fetchQueries() {
      listArea.textContent = 'Loading queries…';
      try {
        const resp = await fetch('/queries');
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || 'Failed to load queries');
        renderQueries(data.queries);
      } catch (error) {
        listArea.innerHTML = `<div class="small">${error.message}</div>`;
      }
    }

    function renderQueries(queries) {
      if (!queries.length) {
        listArea.innerHTML = '<div class="small">No queries have been submitted yet.</div>';
        return;
      }

      const table = document.createElement('table');
      table.className = 'query-table';
      table.innerHTML = `
        <thead>
          <tr>
            <th>#</th>
            <th>Title</th>
            <th>Description</th>
            <th>Status</th>
            <th>Created</th>
          </tr>
        </thead>
      `;
      const body = document.createElement('tbody');
      queries.forEach((query) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${query.number}</td>
          <td>${escapeHtml(query.title)}</td>
          <td>${escapeHtml(query.description)}</td>
          <td></td>
          <td>${new Date(query.createdAt).toLocaleString()}</td>
        `;
        const statusCell = row.querySelector('td:nth-child(4)');
        statusCell.appendChild(createStatusBadge(query.status));
        body.appendChild(row);
      });
      table.appendChild(body);
      listArea.innerHTML = '';
      listArea.appendChild(table);
    }

    function escapeHtml(value) {
      return (value || '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;');
    }

    refreshBtn.addEventListener('click', fetchQueries);
    fetchQueries();
  </script>
</body>
</html>
